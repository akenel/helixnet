# -------------------------------------------------------------
# Stage 2. Main / Helix Stack	App layer	
# Helix Platform + Keycloak + Worker + Beat + Flower + MailHog
# 🛡️ Main HELIX API STACK compose/helix-main/main-stack.yml
# 🔐️ Helix Platform Base Images 
# -------------------------------------------------------------
# 🍿️ Reusable base service config  
# -------------------------------------------------------------
x-base: &base
  image: helix-platform:latest
  env_file: ../../env/helix.env
  restart: unless-stopped
  networks:
    - helixnet_core
  # healthcheck:
  #   # 🚨 FIX: Use a simple port/root path check.
  #   test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/ || exit 1"]
  #   interval: 10s
  #   timeout: 5s
  #   retries: 5
  #   # 🚨 CRITICAL: Give the platform 2.5 minutes to fully boot and connect to Postgres.
  #   start_period: 60s
# -------------------------------------------------------------
# 💦️ Services Helix main API 🛡️
# -------------------------------------------------------------
services:
# -------------------------------------------------------------
# 🧰️ Helix main API 
# -------------------------------------------------------------
  helix-platform:
    <<: *base
    container_name: helix-platform
    build:
      context: ../../
      dockerfile: compose/helix-main/Dockerfile.helix-platform
    ports:
      - "9003:8000"
    environment: # Optional for custom build configurations
      PLATFORM_CONFIG: /app/config/platform-settings.yaml
    volumes:
      - ./compose/config:/app/config
      - ../../src:/app/src
    networks:
      - helixnet_core
      - helixnet_edge
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/healthz', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
# -------------------------------------------------------------
# ⛑️ Worker 🥬️ Celery 
# -------------------------------------------------------------
  worker:
    <<: *base
    container_name: worker
    build:
      context: ../../
      dockerfile: compose/helix-main/Dockerfile.worker
      # deploy:
      #   replicas: 3
      #   resources:
      #     reservations:
      #       cpus: '0.5'
      #       memory: 1G
      #     limits:
      #       cpus: '2'
      #       memory: 4G
    environment:
      SERVICE_TYPE: worker
    volumes:
      - ../../src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "src.tasks.celery_app:app", "inspect", "ping", "-t", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
# -------------------------------------------------------------
# 🥁️ Beat 🥬️ Celery 
# -------------------------------------------------------------
  beat:
    <<: *base
    container_name: beat
    build:
      context: ../../
      dockerfile: compose/helix-main/Dockerfile.beat
    environment:
      SERVICE_TYPE: beat
    volumes:
      - ../../src:/app/src
      - beat_data:/app/beat-data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "src.tasks.celery_app:app", "inspect", "scheduled", "-t", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
# -------------------------------------------------------------
#  🌞️ Flower 🥬️ Monitoring 
# -------------------------------------------------------------
  flower:
    <<: *base
    container_name: flower
    build:
      context: ../../
      dockerfile: compose/helix-main/Dockerfile.flower
    environment:
      SERVICE_TYPE: flower
    ports:
      - "5555:5555"
    volumes:
      - ../../src:/app/src
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5555/healthcheck', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
# -------------------------------------------------------------
# 🧠 LPCX Consumer 🐇 aio-pika (executes compute jobs off the queue)
# -------------------------------------------------------------
  lpcx-consumer:
    <<: *base
    container_name: lpcx-consumer
    working_dir: /app
    entrypoint: ["/app/venv/bin/python", "-m", "src.compute.consumer"]
    environment:
      SERVICE_TYPE: lpcx-consumer
      LPCX_BRAIN_CAP: "50"
    volumes:
      - ../../src:/app/src
    # No cross-file depends_on (rabbitmq/postgres live in core-stack); aio-pika
    # connect_robust retries until the broker is reachable.
    healthcheck:
      # pgrep isn't in the slim image; PID 1 is the consumer (entrypoint runs it directly)
      test: ["CMD-SHELL", "grep -qa src.compute.consumer /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
# -------------------------------------------------------------
# 🗂️ NAMED VOLUMES
# -------------------------------------------------------------
volumes:
  beat_data:
# -------------------------------------------------------------
# 🪐️ Networks
# -------------------------------------------------------------
networks:
  helixnet_core:
    external: true
  helixnet_edge:
    external: true
