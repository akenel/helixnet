<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Head-Shop Card 1 — Intrigue</title>
<!--
  BANCO · Head-Shop outreach · CARD 1 of 4 — "THE INTRIGUE CARD"
  Duplex A6 postcard (148 x 105 mm landscape). Page 1 = front, Page 2 = back.
  Render: node scripts/postcard-to-pdf.js card1-<shop>.html card1-<shop>.pdf
  Design intent: pattern-interrupt, NO sell, minimal brand. The card literally switches
  DE -> FR to prove the point. A bare QR = curiosity. The reveal comes when they scan.
  MERGE FIELDS: {{SHOP_NAME}} {{SHOP_ADDR1}} {{SHOP_ADDR2}} {{SHOP_ZIP_CITY}} {{QR_SRC}} {{TOKEN}}
-->
<style>
  @page { size: 148mm 105mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html, body { width: 148mm; }
  .card { width: 148mm; height: 105mm; position: relative; overflow: hidden;
          background: #ffffff; color: #111; font-family: "Helvetica Neue", Arial, sans-serif;
          page-break-after: always; }
  .card:last-child { page-break-after: auto; }
  .rule { position: absolute; background: #c62828; }
  .seq { position: absolute; top: 6mm; right: 9mm; font-size: 8pt; font-weight: 800; color: #111;
         border: 0.6mm solid #111; border-radius: 999px; padding: 1mm 3mm; }

  /* ---------- FRONT ---------- */
  .front { padding: 10mm 9mm; display: flex; align-items: center; }
  .front .left { flex: 1; padding-right: 6mm; }
  .jab1 { font-size: 22pt; line-height: 1.02; font-weight: 900; letter-spacing: -0.5px; color: #111; }
  .jab2 { font-size: 22pt; line-height: 1.02; font-weight: 900; letter-spacing: -0.5px; color: #c62828;
          font-style: italic; margin-top: 4mm; }
  .front .right { width: 42mm; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .qr-box { width: 36mm; height: 36mm; border: 1.2mm solid #111; padding: 2mm; background: #fff; }
  .qr-box img { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  .qr-cap { font-size: 15pt; font-weight: 900; margin-top: 2mm; text-align: center; }
  .mark { position: absolute; bottom: 6mm; left: 9mm; font-size: 9pt; }

  /* ---------- BACK ---------- */
  .back { padding: 8mm 9mm; display: flex; }
  .back .msg { width: 74mm; padding-right: 6mm; display: flex; flex-direction: column; justify-content: center; }
  .back .msg h2 { font-size: 16pt; font-weight: 900; line-height: 1.1; letter-spacing: -0.3px; }
  .back .msg .miniqr { margin-top: 7mm; display: flex; align-items: center; gap: 3mm; }
  .back .msg .miniqr img { width: 18mm; height: 18mm; border: 0.6mm solid #111; padding: 1mm; image-rendering: pixelated; }
  .back .msg .miniqr span { font-size: 9pt; font-weight: 800; }
  .divider { width: 0.4mm; background: #ddd; }
  .back .addr { flex: 1; padding-left: 6mm; position: relative; }
  .stamp { position: absolute; top: 0; right: 0; width: 20mm; height: 24mm; border: 0.5mm dashed #bbb;
           font-size: 6pt; color: #bbb; text-align: center; display: flex; align-items: center; justify-content: center; }
  .addr .lines { position: absolute; bottom: 8mm; left: 6mm; right: 4mm; }
  .addr .lines .n { font-size: 11pt; font-weight: 800; }
  .addr .lines .l { font-size: 10pt; margin-top: 1.2mm; }
  .sender { position: absolute; top: 8mm; left: 6mm; font-size: 6.5pt; color: #888; line-height: 1.35; }
  .token { position: absolute; bottom: 2mm; right: 3mm; font-size: 5pt; color: #ccc; }
</style>
</head>
<body>

  <!-- ============ FRONT ============ -->
  <div class="card front">
    <div class="rule" style="top:0;left:0;right:0;height:2.2mm;"></div>
    <span class="seq">1 / 4</span>
    <div class="left">
      <div class="jab1">Deine Kasse<br>spricht Deutsch.</div>
      <div class="jab2">Ton client de<br>Gen&egrave;ve, non.</div>
    </div>
    <div class="right">
      <div class="qr-box"><img src="{{QR_SRC}}" alt="QR"></div>
      <div class="qr-cap">?</div>
    </div>
    <div class="mark">🐯</div>
  </div>

  <!-- ============ BACK ============ -->
  <div class="card back">
    <div class="rule" style="top:0;left:0;right:0;height:1.4mm;"></div>
    <div class="msg">
      <h2>Was, wenn sie<br><em>jede</em> Sprache spr&auml;che?</h2>
      <div class="miniqr">
        <img src="{{QR_SRC}}" alt="QR">
        <span>Scann.<br>Mehr sagen wir nicht.</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="addr">
      <div class="stamp"><span>Briefmarke</span></div>
      <div class="sender">
        🐯 &middot; mehr folgt bald.<br>
        Karte 1 von 4.
      </div>
      <div class="lines">
        <div class="n">{{SHOP_NAME}}</div>
        <div class="l">{{SHOP_ADDR1}}</div>
        <div class="l">{{SHOP_ADDR2}}</div>
        <div class="l">{{SHOP_ZIP_CITY}}</div>
      </div>
      <div class="token">{{TOKEN}}</div>
    </div>
  </div>

</body>
</html>
