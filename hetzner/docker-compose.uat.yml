# =============================================================
# HELIXNET UAT STACK -- Hetzner Cloud (Trimmed for Testing)
# File: hetzner/docker-compose.uat.yml
# -------------------------------------------------------------
# Services: Caddy | Postgres | Keycloak | Redis | RabbitMQ |
#           helix-platform | telegram-tigs
# Target: Hetzner CX32 (4 vCPU / 8GB RAM) -- EUR 7.59/mo
# =============================================================
# Usage:
#   docker compose -f docker-compose.uat.yml up -d --build
#   docker compose -f docker-compose.uat.yml logs -f
#   docker compose -f docker-compose.uat.yml down
# =============================================================

services:

# -------------------------------------------------------------
# CADDY -- Reverse Proxy with automatic HTTPS
# -------------------------------------------------------------
# Caddy replaces Traefik for UAT -- simpler, auto-TLS via
# Let's Encrypt (with domain) or self-signed (IP only).
# Config: ./Caddyfile
# -------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - helixnet
    depends_on:
      helix-platform:
        condition: service_healthy
      borrowhood:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

# -------------------------------------------------------------
# POSTGRES -- Primary Database
# -------------------------------------------------------------
  postgres:
    image: postgres:17.6
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: helix_user
      POSTGRES_PASSWORD: helix_pass
      POSTGRES_DB: helix_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helixnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix_user -d helix_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# -------------------------------------------------------------
# KEYCLOAK -- Identity Provider (OIDC / JWT)
# -------------------------------------------------------------
  keycloak:
    build:
      context: ../
      dockerfile: compose/helix-core/Dockerfile.keycloak
      target: final
      args:
        DOCKER_KEYCLOAK_IMAGE: quay.io/keycloak/keycloak
        DOCKER_KEYCLOAK_VERSION: 24.0.4
    image: helix-keycloak-custom:latest
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_PROXY_HEADERS: xforwarded
      # SET THIS to your Hetzner IP or domain before first boot:
      KC_HOSTNAME_URL: https://${HELIX_PUBLIC_HOST}
      KC_LOG_LEVEL: "INFO,org.infinispan.CONFIG:ERROR"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_DB_USERNAME: helix_user
      KC_DB_PASSWORD: helix_pass
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: helix_db
      KEYCLOAK_ADMIN: helix_user
      KEYCLOAK_ADMIN_PASSWORD: helix_pass
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - helixnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

# -------------------------------------------------------------
# REDIS -- Cache + Celery Result Backend
# -------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "helix_pass"]
    networks:
      - helixnet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "helix_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# -------------------------------------------------------------
# RABBITMQ -- Celery Message Broker
# -------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: helix_user
      RABBITMQ_DEFAULT_PASS: helix_pass
    networks:
      - helixnet
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

# -------------------------------------------------------------
# MINIO -- Object Storage (documents, photos)
# -------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: helix_user
      MINIO_ROOT_PASSWORD: helix_pass
    volumes:
      - minio_data:/data
    networks:
      - helixnet
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

# -------------------------------------------------------------
# HELIX-PLATFORM -- FastAPI Application
# -------------------------------------------------------------
  helix-platform:
    build:
      context: ../
      dockerfile: compose/helix-main/Dockerfile.helix-platform
    image: helix-platform:latest
    container_name: helix-platform
    restart: unless-stopped
    env_file:
      - ./uat.env
    environment:
      SERVICE_TYPE: platform
    volumes:
      - ../src:/app/src
    networks:
      - helixnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/healthz', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# -------------------------------------------------------------
# TELEGRAM-TIGS -- Personal AI Co-pilot Bot
# -------------------------------------------------------------
# Long-polling (no webhook needed, no domain required).
# Bridges Telegram <-> Claude API with CLAUDE.md context.
# Voice transcription via faster-whisper (local).
# Will only start if TELEGRAM_BOT_TOKEN is set in uat.env.
# -------------------------------------------------------------
  telegram-tigs:
    build:
      context: ../
      dockerfile: compose/helix-main/Dockerfile.telegram-tigs
    image: telegram-tigs:latest
    container_name: telegram-tigs
    restart: unless-stopped
    env_file:
      - ./uat.env
    volumes:
      - telegram_data:/data
      - ../src:/app/src:ro
      - ../CLAUDE.md:/app/CLAUDE.md:ro
    networks:
      - helixnet
    depends_on:
      postgres:
        condition: service_healthy

# -------------------------------------------------------------
# BORROWHOOD -- Community Rental Platform (DEV Challenge)
# -------------------------------------------------------------
# Separate FastAPI app on port 8443 via Caddy.
# Uses same Postgres instance, separate borrowhood database.
# Public URL: https://46.62.138.218:8443/
# -------------------------------------------------------------
  borrowhood:
    build:
      context: ../BorrowHood
      dockerfile: Dockerfile
    image: borrowhood:latest
    container_name: borrowhood
    restart: unless-stopped
    env_file:
      - ./borrowhood.env
    volumes:
      - ../BorrowHood/src:/app/src
      - ../BorrowHood/seed_data:/app/seed_data
    networks:
      - helixnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

# -------------------------------------------------------------
# NAMED VOLUMES
# -------------------------------------------------------------
volumes:
  postgres_data:
  keycloak_data:
  caddy_data:
  caddy_config:
  minio_data:
  telegram_data:

# -------------------------------------------------------------
# NETWORK -- Single flat network for UAT (no edge/core split)
# -------------------------------------------------------------
networks:
  helixnet:
    driver: bridge
