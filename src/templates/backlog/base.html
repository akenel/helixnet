<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Backlog{% endblock %} - HelixNet</title>

    <!-- Tailwind CSS (bundled -- no CDN dependency) -->
    <link rel="stylesheet" href="/static/vendor/tailwind.min.css">

    <!-- Alpine.js (bundled) -->
    <script defer src="/static/vendor/alpine.min.js"></script>

    <!-- Inter font (bundled) -->
    <link rel="stylesheet" href="/static/vendor/fonts.css">

    <style>
        :root { font-family: 'Inter', sans-serif; }
        body { padding-bottom: 32px; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">

    {% block content %}{% endblock %}

    <script>
        // ============================================================
        // Backlog Auth -- token management for Keycloak RBAC
        // Same pattern as QA Auth
        // ============================================================
        const BacklogAuth = {
            getToken() {
                const token = sessionStorage.getItem('backlog_token');
                if (!token) return null;
                try {
                    const payload = this.decodeToken(token);
                    if (payload.exp * 1000 <= Date.now()) {
                        this.clearToken();
                        return null;
                    }
                } catch (e) {
                    this.clearToken();
                    return null;
                }
                return token;
            },
            setToken(token) { sessionStorage.setItem('backlog_token', token); },
            clearToken() { sessionStorage.removeItem('backlog_token'); },
            decodeToken(token) {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                return JSON.parse(jsonPayload);
            },
            getUserInfo() {
                const token = this.getToken();
                if (!token) return null;
                const payload = this.decodeToken(token);
                return {
                    username: payload.preferred_username || 'Unknown',
                    firstName: payload.given_name || '',
                    lastName: payload.family_name || '',
                    roles: (payload.realm_access?.roles || []).filter(r => r.includes('camper-')),
                };
            },
            logout() {
                this.clearToken();
                const keycloakUrl = 'https://keycloak.helix.local';
                const realm = 'kc-camper-service-realm-dev';
                const redirectUri = encodeURIComponent(window.location.origin + '/backlog/login');
                window.location.href = `${keycloakUrl}/realms/${realm}/protocol/openid-connect/logout?post_logout_redirect_uri=${redirectUri}&client_id=camper_service_web`;
            },
            requireAuth() {
                if (window.location.hash.includes('token=')) {
                    const token = window.location.hash.split('token=')[1]?.split('&')[0];
                    if (token) {
                        this.setToken(token);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
                if (!this.getToken()) {
                    window.location.href = '/backlog/login';
                    return false;
                }
                return true;
            },
        };

        // ============================================================
        // API helper with automatic Bearer token
        // ============================================================
        const API = {
            async call(endpoint, options = {}) {
                const token = BacklogAuth.getToken();
                const defaultHeaders = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };
                if (token) {
                    defaultHeaders['Authorization'] = `Bearer ${token}`;
                }
                const config = {
                    ...options,
                    headers: { ...defaultHeaders, ...options.headers }
                };
                const response = await fetch(endpoint, config);
                if (response.status === 401) {
                    showToast('Session expired. Redirecting to login...', 'warning');
                    BacklogAuth.clearToken();
                    setTimeout(() => { window.location.href = '/backlog/login'; }, 1500);
                    throw new Error('Session expired');
                }
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.detail || `Error ${response.status}`);
                }
                if (response.status === 204) return null;
                return await response.json();
            },
            get(endpoint) { return this.call(endpoint, { method: 'GET' }); },
            post(endpoint, data) { return this.call(endpoint, { method: 'POST', body: JSON.stringify(data) }); },
            put(endpoint, data) { return this.call(endpoint, { method: 'PUT', body: JSON.stringify(data) }); },
            del(endpoint) { return this.call(endpoint, { method: 'DELETE' }); },
        };

        // Toast notification
        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-amber-600',
                info: 'bg-blue-600'
            };
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-4 rounded-lg shadow-xl z-50 transform transition-all duration-300 text-sm font-medium max-w-sm`;
            toast.textContent = message;
            toast.style.transform = 'translateX(400px)';
            document.body.appendChild(toast);
            requestAnimationFrame(() => { toast.style.transform = 'translateX(0)'; });
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
