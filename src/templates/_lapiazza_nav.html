<!-- La Piazza shared nav — the hallway that joins every room. Self-contained styles
     so it looks right on any page regardless of that page's Tailwind config. -->
<style>
  .lp-nav{position:sticky;top:0;z-index:60;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    background:rgba(6,9,16,0.88);border-bottom:1px solid rgba(30,41,59,0.7);font-family:Inter,system-ui,sans-serif}
  .lp-nav-in{max-width:72rem;margin:0 auto;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
  .lp-logo{font-weight:900;letter-spacing:-.02em;color:#f1f5f9;text-decoration:none;font-size:17px;white-space:nowrap}
  .lp-logo b{color:#C0392B}
  .lp-links{display:flex;align-items:center;gap:2px;font-size:14px}
  .lp-link{padding:6px 11px;border-radius:8px;color:#94a3b8;text-decoration:none;white-space:nowrap}
  .lp-link:hover{color:#f1f5f9;background:rgba(30,41,59,0.6)}
  .lp-link.active{color:#fff;background:rgba(192,57,43,0.22);box-shadow:inset 0 -2px 0 #C0392B}
  .lp-cta{margin-left:6px;padding:6px 14px;border-radius:8px;font-weight:700;background:#C0392B;color:#fff;text-decoration:none;white-space:nowrap}
  .lp-cta:hover{background:#8B0000}
  @media(max-width:560px){.lp-hide-sm{display:none}}
</style>
<nav class="lp-nav">
  <div class="lp-nav-in">
    <a href="/" class="lp-logo">La <b>Piazza</b></a>
    <div class="lp-links">
      <a href="https://lapiazza.app" class="lp-link">🏪 <span class="lp-hide-sm">Square</span></a>
      <a href="/compute/bottega" class="lp-link" data-nav="workshop">🔧 <span class="lp-hide-sm">Workshop</span></a>
      <a href="/compute" class="lp-link" data-nav="exchange">⚡ <span class="lp-hide-sm">Exchange</span></a>
      <a href="/compute/me" class="lp-link" data-nav="me">🐺 <span class="lp-hide-sm">You</span></a>
      <a href="/compute/faq" class="lp-link lp-hide-sm" data-nav="faq">FAQ</a>
      <a href="/get-started" class="lp-cta">Get&nbsp;Started</a>
    </div>
  </div>
</nav>
<script>(function(){var p=location.pathname;document.querySelectorAll('.lp-nav [data-nav]').forEach(function(a){var d=a.getAttribute('data-nav');var on=(d==='workshop'&&p.indexOf('/compute/bottega')===0)||(d==='me'&&p.indexOf('/compute/me')===0)||(d==='exchange'&&(p==='/compute'||p==='/compute/dashboard'))||(d==='faq'&&(p.indexOf('/compute/faq')===0||p.indexOf('/compute/help')===0));if(on)a.classList.add('active');});})();</script>
