{% extends "pos/base.html" %}

{% block title %}KB Approvals - HelixPOS{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50" x-data="kbApprovalData()">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="card">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900" data-i18n="kb.title">📚 KB Approvals</h1>
                    <p class="text-gray-600" data-i18n="kb.subtitle">Review and approve CRACK knowledge contributions</p>
                </div>
                <div class="flex gap-2">
                    <button @click="selectAll()"
                            class="btn-secondary px-4 py-2"
                            :disabled="pendingKBs.length === 0"
                            data-i18n="kb.select_all">
                        ☑️ Select All
                    </button>
                    <button @click="approveSelected()"
                            class="btn-success px-4 py-2"
                            :disabled="selectedKBs.length === 0">
                        <span data-i18n="kb.approve_paren">✅ Approve (</span><span x-text="selectedKBs.length"></span>)
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-4 gap-4 mb-6">
                <div class="bg-yellow-50 rounded-lg p-4 text-center">
                    <div class="text-3xl font-bold text-yellow-600" x-text="pendingKBs.length"></div>
                    <div class="text-sm text-yellow-700" data-i18n="kb.stat_pending_review">Pending Review</div>
                </div>
                <div class="bg-blue-50 rounded-lg p-4 text-center">
                    <div class="text-3xl font-bold text-blue-600" x-text="inReviewKBs.length"></div>
                    <div class="text-sm text-blue-700" data-i18n="kb.stat_in_review">In Review</div>
                </div>
                <div class="bg-green-50 rounded-lg p-4 text-center">
                    <div class="text-3xl font-bold text-green-600" x-text="approvedToday"></div>
                    <div class="text-sm text-green-700" data-i18n="kb.stat_approved_today">Approved Today</div>
                </div>
                <div class="bg-purple-50 rounded-lg p-4 text-center">
                    <div class="text-3xl font-bold text-purple-600" x-text="totalCreditsAwarded"></div>
                    <div class="text-sm text-purple-700" data-i18n="kb.stat_credits_awarded">Credits Awarded</div>
                </div>
            </div>

            <!-- Filter Tabs -->
            <div class="flex gap-2 mb-6 border-b">
                <button @click="filter = 'pending'"
                        :class="filter === 'pending' ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-gray-500'"
                        class="px-4 py-2 font-medium">
                    <span data-i18n="kb.tab_pending">📥 Pending (</span><span x-text="pendingKBs.length"></span>)
                </button>
                <button @click="filter = 'in_review'"
                        :class="filter === 'in_review' ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-gray-500'"
                        class="px-4 py-2 font-medium">
                    <span data-i18n="kb.tab_in_review">👀 In Review (</span><span x-text="inReviewKBs.length"></span>)
                </button>
                <button @click="filter = 'approved'"
                        :class="filter === 'approved' ? 'border-b-2 border-indigo-500 text-indigo-600' : 'text-gray-500'"
                        class="px-4 py-2 font-medium"
                        data-i18n="kb.tab_recently_approved">
                    ✅ Recently Approved
                </button>
            </div>

            <!-- KB List -->
            <div class="space-y-4">
                <template x-for="kb in filteredKBs" :key="kb.id">
                    <div class="border-2 rounded-lg p-4 transition"
                         :class="selectedKBs.includes(kb.id) ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-indigo-300'">

                        <!-- Header -->
                        <div class="flex items-start gap-4">
                            <!-- Checkbox -->
                            <input type="checkbox"
                                   :checked="selectedKBs.includes(kb.id)"
                                   @change="toggleSelect(kb.id)"
                                   class="mt-1 w-5 h-5 rounded">

                            <!-- Content -->
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-lg font-semibold text-gray-900" x-text="kb.title"></h3>
                                        <p class="text-sm text-gray-500">
                                            <span data-i18n="kb.by">by</span> <span class="font-medium" x-text="kb.author_handle"></span>
                                            <span x-text="crackEmoji(kb.author_crack_level)"></span>
                                            • <span x-text="kb.category"></span>
                                            • <span x-text="formatDate(kb.submitted_at)"></span>
                                        </p>
                                    </div>
                                    <div class="text-right">
                                        <span class="inline-block px-2 py-1 rounded text-xs font-medium"
                                              :class="statusClass(kb.status)"
                                              x-text="kb.status"></span>
                                    </div>
                                </div>

                                <!-- Summary -->
                                <p class="mt-2 text-gray-600" x-text="kb.summary"></p>

                                <!-- Quality Badges -->
                                <div class="flex gap-2 mt-3">
                                    <span x-show="kb.has_images" class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs" data-i18n="kb.badge_images">📷 Images</span>
                                    <span x-show="kb.has_video" class="px-2 py-1 bg-purple-100 text-purple-700 rounded text-xs" data-i18n="kb.badge_video">🎬 Video</span>
                                    <span x-show="kb.has_bom" class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs" data-i18n="kb.badge_bom">📋 BOM/Recipe</span>
                                    <span x-show="kb.has_lab_report" class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs" data-i18n="kb.badge_lab_report">🔬 Lab Report</span>
                                    <span x-show="kb.jh_reference" class="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs" x-text="'📖 ' + kb.jh_reference"></span>
                                </div>

                                <!-- Credits Preview -->
                                <div class="mt-3 flex items-center gap-4 text-sm">
                                    <span class="text-gray-500" data-i18n="kb.credits_if_approved">Credits if approved:</span>
                                    <span class="font-bold text-green-600" x-text="kb.potential_credits + ' ' + t('kb.credits')"></span>
                                    <span class="text-gray-400" x-text="t('kb.base_bonuses', {n: (kb.potential_credits - 100)})"></span>
                                </div>

                                <!-- Review Summary -->
                                <div x-show="kb.reviews && kb.reviews.length > 0" class="mt-3 p-3 bg-gray-50 rounded">
                                    <div class="text-sm font-medium text-gray-700 mb-2" data-i18n="kb.crack_reviews">CRACK Reviews:</div>
                                    <div class="flex gap-4">
                                        <span class="text-green-600">👍 <span x-text="kb.reviews.filter(r => r.recommend).length"></span> <span data-i18n="kb.recommend">recommend</span></span>
                                        <span class="text-red-600">👎 <span x-text="kb.reviews.filter(r => !r.recommend).length"></span> <span data-i18n="kb.concerns">concerns</span></span>
                                        <span class="text-yellow-600">⭐ <span x-text="kb.average_rating.toFixed(1)"></span><span data-i18n="kb.avg_suffix">/5 avg</span></span>
                                    </div>
                                </div>

                                <!-- Actions -->
                                <div class="mt-4 flex gap-2">
                                    <button @click="previewKB(kb)" class="btn-secondary text-sm px-3 py-1" data-i18n="kb.preview">
                                        👁️ Preview
                                    </button>
                                    <button @click="sendForReview(kb)" x-show="kb.status === 'submitted'" class="btn-secondary text-sm px-3 py-1" data-i18n="kb.send_to_cracks">
                                        📤 Send to CRACKs
                                    </button>
                                    <button @click="approveOne(kb)" class="btn-success text-sm px-3 py-1" data-i18n="kb.approve">
                                        ✅ Approve
                                    </button>
                                    <button @click="rejectKB(kb)" class="text-sm px-3 py-1 text-red-600 hover:bg-red-50 rounded" data-i18n="kb.reject">
                                        ❌ Reject
                                    </button>
                                    <button @click="featureKB(kb)" x-show="kb.status === 'approved'" class="text-sm px-3 py-1 text-yellow-600 hover:bg-yellow-50 rounded" data-i18n="kb.feature">
                                        ⭐ Feature
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Empty State -->
                <div x-show="filteredKBs.length === 0" class="text-center py-12 text-gray-500">
                    <div class="text-6xl mb-4">📭</div>
                    <p data-i18n="kb.empty_state">No KBs in this category</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div x-show="previewingKB" x-transition class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-auto m-4">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-2xl font-bold" x-text="previewingKB?.title"></h2>
                    <button @click="previewingKB = null" class="text-gray-500 hover:text-gray-700">✕</button>
                </div>
                <div class="prose max-w-none" x-html="previewingKB?.content || t('kb.loading')"></div>
                <div class="mt-6 flex gap-2 justify-end">
                    <button @click="previewingKB = null" class="btn-secondary" data-i18n="kb.close">Close</button>
                    <button @click="approveOne(previewingKB); previewingKB = null" class="btn-success" data-i18n="kb.approve">✅ Approve</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function kbApprovalData() {
        return {
            filter: 'pending',
            selectedKBs: [],
            previewingKB: null,
            approvedToday: 5,
            totalCreditsAwarded: 1250,

            pendingKBs: [],
            inReviewKBs: [],
            approvedKBs: [],

            async init() {
                await this.loadKBs();
            },

            async loadKBs() {
                try {
                    const token = sessionStorage.getItem('access_token');
                    if (!token) {
                        showToast(t('kb.please_log_in'), 'warning');
                        return;
                    }

                    // Load all pending KBs
                    const response = await fetch('/api/v1/kb/pending?status_filter=all', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!response.ok) {
                        if (response.status === 403) {
                            showToast(t('kb.manager_access_required'), 'warning');
                            return;
                        }
                        throw new Error('Failed to load KBs');
                    }

                    const kbs = await response.json();
                    this.pendingKBs = kbs.map(kb => ({
                        ...kb,
                        reviews: [],
                        average_rating: kb.rating_average || 0
                    }));

                } catch (error) {
                    console.error('Load KBs error:', error);
                    showToast(t('kb.failed_load'), 'error');
                }
            },

            get filteredKBs() {
                if (this.filter === 'pending') return this.pendingKBs.filter(kb => kb.status === 'submitted');
                if (this.filter === 'in_review') return this.pendingKBs.filter(kb => kb.status === 'in_review');
                if (this.filter === 'approved') return this.approvedKBs;
                return [];
            },

            selectAll() {
                if (this.selectedKBs.length === this.filteredKBs.length) {
                    this.selectedKBs = [];
                } else {
                    this.selectedKBs = this.filteredKBs.map(kb => kb.id);
                }
            },

            toggleSelect(id) {
                if (this.selectedKBs.includes(id)) {
                    this.selectedKBs = this.selectedKBs.filter(x => x !== id);
                } else {
                    this.selectedKBs.push(id);
                }
            },

            async approveSelected() {
                const count = this.selectedKBs.length;
                if (!confirm(t('kb.confirm_approve_batch', {n: count}))) return;

                try {
                    const token = sessionStorage.getItem('access_token');
                    const response = await fetch('/api/v1/kb/approve-batch', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(this.selectedKBs)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        showToast(result.message, 'success');

                        // Move to approved
                        this.pendingKBs = this.pendingKBs.filter(kb => !this.selectedKBs.includes(kb.id));
                        this.approvedToday += result.approved_count;
                        this.totalCreditsAwarded += result.total_credits_awarded;
                        this.selectedKBs = [];
                    } else {
                        throw new Error('Batch approve failed');
                    }
                } catch (error) {
                    showToast(t('kb.failed_approve') + ': ' + error.message, 'error');
                }
            },

            async approveOne(kb) {
                try {
                    const token = sessionStorage.getItem('access_token');
                    const response = await fetch(`/api/v1/kb/${kb.id}/approve`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const result = await response.json();
                        showToast(result.message, 'success');
                        this.pendingKBs = this.pendingKBs.filter(k => k.id !== kb.id);
                        this.approvedToday++;
                        this.totalCreditsAwarded += result.credits_awarded;
                    } else {
                        throw new Error('Approve failed');
                    }
                } catch (error) {
                    showToast(t('kb.failed_approve') + ': ' + error.message, 'error');
                }
            },

            async sendForReview(kb) {
                try {
                    const token = sessionStorage.getItem('access_token');
                    const response = await fetch(`/api/v1/kb/${kb.id}/send-for-review`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        kb.status = 'in_review';
                        showToast(t('kb.sent_for_review'), 'info');
                    }
                } catch (error) {
                    showToast(t('kb.failed_generic') + ': ' + error.message, 'error');
                }
            },

            async rejectKB(kb) {
                const reason = prompt(t('kb.reject_reason_prompt'));
                if (reason && reason.length >= 10) {
                    try {
                        const token = sessionStorage.getItem('access_token');
                        const response = await fetch(`/api/v1/kb/${kb.id}/reject?reason=${encodeURIComponent(reason)}`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });

                        if (response.ok) {
                            showToast(t('kb.rejected_feedback', {handle: kb.author_handle}), 'warning');
                            this.pendingKBs = this.pendingKBs.filter(k => k.id !== kb.id);
                        }
                    } catch (error) {
                        showToast(t('kb.failed_generic') + ': ' + error.message, 'error');
                    }
                } else if (reason) {
                    showToast(t('kb.min_feedback'), 'warning');
                }
            },

            async featureKB(kb) {
                showToast(t('kb.featured', {title: kb.title, handle: kb.author_handle}), 'success');
            },

            previewKB(kb) {
                this.previewingKB = kb;
                // TODO: Load full content
                this.previewingKB.content = `<h2>${kb.title}</h2><p>${kb.summary}</p><p><em>${t('kb.full_content_placeholder')}</em></p>`;
            },

            formatDate(dateStr) {
                // Delegate to the global date seam (base.html), keyed off POSConfig.locale.
                return window.formatDate(dateStr, { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            },

            statusClass(status) {
                const classes = {
                    'submitted': 'bg-yellow-100 text-yellow-700',
                    'in_review': 'bg-blue-100 text-blue-700',
                    'approved': 'bg-green-100 text-green-700',
                    'published': 'bg-purple-100 text-purple-700',
                    'rejected': 'bg-red-100 text-red-700'
                };
                return classes[status] || '';
            },

            crackEmoji(level) {
                const emojis = {
                    'seedling': '🌱',
                    'sprout': '🌿',
                    'rooted': '🪴',
                    'growing': '🌳',
                    'blazing': '💨',
                    'oracle': '👑'
                };
                return emojis[level] || '🌱';
            }
        }
    }
</script>
{% endblock %}
