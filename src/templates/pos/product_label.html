<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ name }} — Label</title>
<script src="/static/vendor/jsbarcode.min.js"></script>
<style>
  :root{ --ink:#111; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; color:var(--ink); background:#e9e9e9; padding:20px; text-align:center; }
  .bar{ margin-bottom:16px; }
  .bar button{ padding:10px 20px; font-size:15px; font-weight:700; border:none; border-radius:10px; background:#1a4d2e; color:#fff; cursor:pointer; }
  .bar a{ display:inline-block; margin-left:10px; padding:10px 16px; font-size:14px; color:#1a4d2e; text-decoration:none; }
  /* 62mm Brother QL label — fixed physical width, auto height */
  .label{ width:62mm; min-height:30mm; margin:0 auto; background:#fff; padding:3mm 3mm 2mm; box-shadow:0 2px 8px rgba(0,0,0,.15); display:flex; flex-direction:column; align-items:center; }
  .store{ font-size:2.6mm; color:#555; letter-spacing:.02em; }
  .pname{ font-size:3.6mm; font-weight:800; line-height:1.15; margin:1mm 0; max-height:9mm; overflow:hidden; }
  .price{ font-size:6mm; font-weight:800; color:#8B0000; margin:0.5mm 0 1.5mm; }
  svg.code{ width:100%; height:14mm; }
  .human{ font-size:2.6mm; font-family:monospace; color:#333; letter-spacing:.05em; margin-top:.5mm; }
  .nocode{ font-size:2.8mm; color:#999; padding:3mm 0; }
  @media print{
    body{ background:#fff; padding:0; }
    .bar{ display:none; }
    .label{ box-shadow:none; margin:0; }
    @page{ size:62mm auto; margin:0; }
  }
</style></head>
<body>
  <div class="bar">
    <button onclick="window.print()">🖨️ Print label</button>
    <a href="javascript:history.back()">← Back</a>
  </div>

  <div class="label">
    {% if store_name %}<div class="store">{{ store_name }}</div>{% endif %}
    <div class="pname">{{ name }}</div>
    {% if price %}<div class="price">{{ currency }} {{ price }}</div>{% endif %}
    {% if barcode %}
      <svg class="code" id="bc"></svg>
    {% else %}
      <div class="nocode">— no barcode —</div>
    {% endif %}
    <div class="human">{{ sku }}</div>
  </div>

  <script>
    (function(){
      var code = {{ barcode | tojson }};
      if (!code) return;
      // 13-digit numeric → EAN13 (retail scanners love it); anything else → CODE128 (universal).
      var isEan13 = /^\d{13}$/.test(code);
      try {
        JsBarcode("#bc", code, {
          format: isEan13 ? "EAN13" : "CODE128",
          displayValue: true, fontSize: 26, height: 48, margin: 0, width: 1.6
        });
      } catch (e) {
        // Bad EAN checksum etc. → fall back to CODE128 so it still renders + scans.
        try { JsBarcode("#bc", code, { format: "CODE128", displayValue: true, fontSize: 26, height: 48, margin: 0, width: 1.6 }); } catch (_) {}
      }
    })();
  </script>
</body></html>
