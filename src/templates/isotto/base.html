<!DOCTYPE html>
<html lang="it" id="isotto-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ISOTTO Sport{% endblock %} - Gestione Stampa</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js for reactive components -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            font-family: 'Inter', sans-serif;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-5 rounded-lg shadow-lg transition-all duration-200;
        }
        .btn-secondary {
            @apply bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 px-5 rounded-lg shadow transition-all duration-200;
        }
        .btn-danger {
            @apply bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-5 rounded-lg shadow-lg transition-all duration-200;
        }
        .btn-success {
            @apply bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-5 rounded-lg shadow-lg transition-all duration-200;
        }
        .card {
            @apply bg-white rounded-xl shadow-lg p-6;
        }
        .input-field {
            @apply w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all;
        }

        /* Status bar */
        .helix-status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: linear-gradient(to right, #1e3a5f, #1e40af);
            color: #93c5fd;
            font-size: 12px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 9999;
            border-top: 1px solid #2563eb;
        }
        .helix-status-bar .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse-glow 2s infinite;
        }
        .helix-status-bar .pulse.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
        .helix-status-bar .pulse.warn { background: #eab308; box-shadow: 0 0 6px #eab308; }
        .helix-status-bar .pulse.error { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .helix-status-bar .status-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .helix-status-bar .divider { color: #1d4ed8; }
        body { padding-bottom: 32px; }

        /* Status badges */
        .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
        .badge-quoted { @apply bg-gray-100 text-gray-800; }
        .badge-approved { @apply bg-blue-100 text-blue-800; }
        .badge-in_production { @apply bg-amber-100 text-amber-800; }
        .badge-quality_check { @apply bg-purple-100 text-purple-800; }
        .badge-ready { @apply bg-green-100 text-green-800; }
        .badge-picked_up { @apply bg-slate-100 text-slate-800; }
        .badge-invoiced { @apply bg-emerald-100 text-emerald-800; }
        .badge-cancelled { @apply bg-gray-200 text-gray-500; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">

    {% block content %}{% endblock %}

    <!-- i18n translations -->
    <script src="/static/isotto-i18n.js?v=20260224"></script>

    <!-- Global JavaScript utilities -->
    <script>
        // ===== i18n: Language Detection =====
        // Priority: 1) ?lang=xx URL param  2) localStorage  3) Keycloak locale  4) default 'it'
        (function() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && ISOTTO_STRINGS[urlLang]) {
                localStorage.setItem('isotto_lang', urlLang);
            }
            let lang = localStorage.getItem('isotto_lang');
            if (!lang) {
                try {
                    const token = sessionStorage.getItem('isotto_token');
                    if (token) {
                        const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                        if (payload.locale && ISOTTO_STRINGS[payload.locale]) {
                            lang = payload.locale;
                        }
                    }
                } catch (e) { /* ignore parse errors */ }
            }
            lang = lang || 'it';
            window._isottoLang = ISOTTO_STRINGS[lang] ? lang : 'it';
            document.documentElement.lang = window._isottoLang === 'it' ? 'it' : 'en';
        })();

        // Switch language and reload
        function switchLanguage(newLang) {
            if (ISOTTO_STRINGS[newLang]) {
                localStorage.setItem('isotto_lang', newLang);
                window.location.reload();
            }
        }

        // Translation helper: t('nav.dashboard') => translated string
        function t(key, replacements) {
            const lang = window._isottoLang || 'it';
            const keys = key.split('.');
            let val = ISOTTO_STRINGS[lang];
            for (const k of keys) {
                if (val && typeof val === 'object' && k in val) {
                    val = val[k];
                } else {
                    // Fallback to Italian
                    let fb = ISOTTO_STRINGS.it;
                    for (const fk of keys) {
                        if (fb && typeof fb === 'object' && fk in fb) fb = fb[fk]; else return key;
                    }
                    return typeof fb === 'string' ? fb : key;
                }
            }
            if (replacements && typeof val === 'string') {
                for (const [rk, rv] of Object.entries(replacements)) {
                    val = val.replace('{' + rk + '}', rv);
                }
            }
            return val;
        }
        // JWT token management for ISOTTO Sport
        const IsottoAuth = {
            getToken() {
                return sessionStorage.getItem('isotto_token');
            },
            setToken(token) {
                sessionStorage.setItem('isotto_token', token);
            },
            clearToken() {
                sessionStorage.removeItem('isotto_token');
            },
            decodeToken(token) {
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                } catch (e) {
                    console.error('Failed to decode token:', e);
                    return null;
                }
            },
            getUserInfo() {
                const token = this.getToken();
                if (!token) return null;
                const payload = this.decodeToken(token);
                if (!payload) return null;
                const roles = (payload.realm_access?.roles || []).filter(r => r.includes('isotto-'));
                return {
                    username: payload.preferred_username || 'Unknown',
                    firstName: payload.given_name || '',
                    lastName: payload.family_name || '',
                    email: payload.email || '',
                    roles: roles
                };
            },
            hasRole(role) {
                const user = this.getUserInfo();
                return user && user.roles.some(r => r.includes(role));
            },
            isAdmin() { return this.hasRole('isotto-admin'); },
            isManager() { return this.hasRole('isotto-manager') || this.isAdmin(); },
            isOperator() { return this.hasRole('isotto-operator') || this.isManager(); },
            isDesigner() { return this.hasRole('isotto-designer') || this.isManager(); },
            isCounter() { return this.hasRole('isotto-counter') || this.isManager(); },
            logout() {
                this.clearToken();
                const keycloakUrl = 'https://keycloak.helix.local';
                const realm = 'kc-isotto-print-realm-dev';
                const redirectUri = encodeURIComponent(window.location.origin + '/print-shop');
                window.location.href = `${keycloakUrl}/realms/${realm}/protocol/openid-connect/logout?post_logout_redirect_uri=${redirectUri}&client_id=isotto_print_web`;
            }
        };

        // API helper with automatic auth
        const API = {
            async call(endpoint, options = {}) {
                const token = IsottoAuth.getToken();
                const defaultHeaders = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };
                if (token) {
                    defaultHeaders['Authorization'] = `Bearer ${token}`;
                }
                const config = {
                    ...options,
                    headers: { ...defaultHeaders, ...options.headers }
                };
                try {
                    const response = await fetch(endpoint, config);
                    if (response.status === 401) {
                        IsottoAuth.logout();
                        throw new Error(t('system.session_expired'));
                    }
                    if (!response.ok) {
                        const error = await response.json().catch(() => ({}));
                        throw new Error(error.detail || t('system.error_status', {status: response.status}));
                    }
                    if (response.status === 204) return null;
                    return await response.json();
                } catch (error) {
                    console.error('API call failed:', error);
                    throw error;
                }
            },
            get(endpoint) { return this.call(endpoint, { method: 'GET' }); },
            post(endpoint, data) { return this.call(endpoint, { method: 'POST', body: JSON.stringify(data) }); },
            put(endpoint, data) { return this.call(endpoint, { method: 'PUT', body: JSON.stringify(data) }); },
            patch(endpoint, data) { return this.call(endpoint, { method: 'PATCH', body: JSON.stringify(data) }); },
            delete(endpoint) { return this.call(endpoint, { method: 'DELETE' }); }
        };

        // Config
        const IsottoConfig = {
            currency: 'EUR',
            lang: window._isottoLang || 'it',
            locale: (window._isottoLang === 'en') ? 'en-GB' : 'it-IT',
            vat_rate: 22
        };

        // Price formatting (EUR)
        function formatPrice(amount) {
            return new Intl.NumberFormat(IsottoConfig.locale, {
                style: 'currency',
                currency: IsottoConfig.currency
            }).format(amount);
        }

        // Date formatting (locale-aware)
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleDateString(IsottoConfig.locale, {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            return new Date(dateStr).toLocaleString(IsottoConfig.locale, {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        // Status labels (from i18n dictionary)
        const ORDER_STATUS_LABELS = ISOTTO_STRINGS[IsottoConfig.lang].status.order;
        const PRODUCT_TYPE_LABELS = ISOTTO_STRINGS[IsottoConfig.lang].status.product_type;
        const COLOR_MODE_LABELS = ISOTTO_STRINGS[IsottoConfig.lang].status.color_mode;
        const LAMINATION_LABELS = ISOTTO_STRINGS[IsottoConfig.lang].status.lamination;
        const PAYMENT_STATUS_LABELS = ISOTTO_STRINGS[IsottoConfig.lang].status.payment;

        // Toast notification
        function showToast(message, type = 'info') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                warning: 'bg-yellow-500',
                info: 'bg-blue-500'
            };
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-4 rounded-lg shadow-lg z-50 transform transition-all duration-300`;
            toast.textContent = message;
            toast.style.transform = 'translateX(400px)';
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.transform = 'translateX(0)'; }, 10);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
    </script>

    {% block extra_scripts %}{% endblock %}

    <!-- Status Bar -->
    <footer class="helix-status-bar" id="helix-status">
        <div class="status-section">
            <span class="pulse ok" id="status-pulse"></span>
            <span id="status-text" data-i18n="system.ok">Sistema OK</span>
            <span class="divider">|</span>
            <span id="status-time">--:--</span>
        </div>
        <div class="status-section">
            <span id="status-screen">{% block page_name %}ISOTTO Sport{% endblock %}</span>
            <span class="divider">|</span>
            <select id="lang-switch" onchange="switchLanguage(this.value)"
                style="background:#1e3a5f;color:#93c5fd;border:1px solid #2563eb;border-radius:3px;font-size:12px;padding:1px 4px;cursor:pointer;font-family:inherit;">
                <option value="it" style="background:#1e3a5f;">IT</option>
                <option value="en" style="background:#1e3a5f;">EN</option>
            </select>
            <span class="divider">|</span>
            <span id="status-user">--</span>
        </div>
    </footer>

    <script>
        // ===== i18n: data-i18n attribute handler =====
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                const key = el.getAttribute('data-i18n');
                const val = t(key);
                if (val !== key) el.textContent = val;
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
                const key = el.getAttribute('data-i18n-placeholder');
                const val = t(key);
                if (val !== key) el.placeholder = val;
            });
            document.querySelectorAll('[data-i18n-html]').forEach(function(el) {
                const key = el.getAttribute('data-i18n-html');
                const val = t(key);
                if (val !== key) el.innerHTML = val;
            });
            // Set language switcher to current language
            const langSwitch = document.getElementById('lang-switch');
            if (langSwitch) langSwitch.value = window._isottoLang || 'it';
        });

        (function() {
            function updateStatusBar() {
                const now = new Date();
                document.getElementById('status-time').textContent =
                    now.toLocaleTimeString(IsottoConfig.locale, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const user = IsottoAuth.getUserInfo();
                if (user) {
                    document.getElementById('status-user').textContent = user.username;
                }
            }
            async function checkHealth() {
                try {
                    const response = await fetch('/health/healthz', { timeout: 5000 });
                    const pulse = document.getElementById('status-pulse');
                    const statusText = document.getElementById('status-text');
                    if (response.ok) {
                        pulse.className = 'pulse ok';
                        statusText.textContent = t('system.ok');
                    } else {
                        pulse.className = 'pulse warn';
                        statusText.textContent = t('system.degraded');
                    }
                } catch (e) {
                    document.getElementById('status-pulse').className = 'pulse error';
                    document.getElementById('status-text').textContent = t('system.offline');
                }
            }
            updateStatusBar();
            checkHealth();
            setInterval(updateStatusBar, 1000);
            setInterval(checkHealth, 30000);
        })();
    </script>
</body>
</html>
