<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1920px;height:1080px;overflow:hidden;font-family:Inter,system-ui,sans-serif;color:#fff;
    background:linear-gradient(135deg,#1a1206 0%,#2a1a0a 45%,#3a1212 100%);position:relative}
  .grain{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 4px)}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 130px}
  .kick{font-size:32px;letter-spacing:.4em;color:#E8A23D;font-weight:800;text-transform:uppercase}
  h1{font-family:'Bebas Neue',sans-serif;font-size:200px;line-height:.86;letter-spacing:.01em;margin:14px 0 6px;text-shadow:0 6px 30px rgba(0,0,0,.5)}
  h1 .red{color:#E0492B}
  .sub{font-size:46px;font-weight:800;color:#fff;margin-top:18px}
  .row{display:flex;gap:46px;margin-top:40px;flex-wrap:wrap}
  .chip{font-size:34px;font-weight:700;color:#f1d9b0;display:flex;align-items:center;gap:14px}
  .chip b{color:#fff}
  .cookie{margin-top:34px;font-size:30px;color:#E8A23D;font-weight:700}
  .crane{position:absolute;right:90px;top:70px;font-size:300px;opacity:.16;transform:rotate(-8deg)}
  .foot{position:absolute;bottom:64px;left:130px;font-size:26px;color:#caa37a;font-weight:600;display:flex;align-items:center;gap:14px}
</style></head>
<body>
  <div class="grain"></div>
  <div class="crane">🏗️</div>
  <div class="wrap">
    <div class="kick">🐺 La Piazza · Help Board · Trapani</div>
    <h1>GARAGE<br><span class="red">MOVING DAY</span></h1>
    <div class="sub">A 1,000-lb car crane. One Saturday. We lift it together.</div>
    <div class="row">
      <div class="chip">🙌 <b>20 hands</b> needed</div>
      <div class="chip">💪 fit folks welcome</div>
      <div class="chip">📅 <b>Sat</b> · 8:00</div>
    </div>
    <div class="cookie">🍪 Cookies provided by Sally — bring your back, leave with a friend.</div>
  </div>
  <div class="foot">🐺 Posted by Mike · join the lift on La Piazza</div>
</body></html>
